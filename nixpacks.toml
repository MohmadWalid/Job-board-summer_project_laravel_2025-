[phases.setup]
nixPkgs = ["php84", "php84Extensions.pdo", "php84Extensions.pdo_mysql", "php84Extensions.mbstring", "php84Extensions.tokenizer", "php84Extensions.xml", "php84Extensions.ctype", "php84Extensions.json", "php84Extensions.bcmath", "php84Extensions.curl", "php84Extensions.fileinfo", "composer"]

[phases.install]
cmds = ["cd job-app && composer install --no-dev --optimize-autoloader --no-scripts --no-interaction"]

[phases.build]
cmds = ["cd job-app && php artisan config:cache", "cd job-app && php artisan route:cache", "cd job-app && php artisan view:cache"]

[start]
cmd = "cd job-app && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"
