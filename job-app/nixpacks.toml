[phases.setup]
nixPkgs = ["php84", "php84Extensions.pdo", "php84Extensions.pdo_mysql", "php84Extensions.mbstring", "php84Extensions.tokenizer", "php84Extensions.xml", "php84Extensions.ctype", "php84Extensions.json", "php84Extensions.bcmath", "php84Extensions.curl", "php84Extensions.fileinfo", "composer"]

[providers]
only = ["php"]

[phases.install]
cmds = ["composer update --no-dev --optimize-autoloader --no-scripts --no-interaction"]

[phases.build]
cmds = ["php artisan config:cache", "php artisan route:cache", "php artisan view:cache"]

[start]
cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"
